<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task dan Jam Pulang Kantor</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#eef2f6;
  font-family:Arial;
}

.card{
  background:white;
  padding:30px;
  border-radius:18px;
  width:460px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
  text-align:center;
}

h2{
  margin:0;
}

.subtitle{
  font-size:12px;
  color:#777;
  margin-bottom:10px;
}

.nowTime{
  font-size:20px;
  font-weight:bold;
}

.nowDate{
  font-size:13px;
  color:#777;
  margin-bottom:10px;
}

/* 🔥 FIXED BUTTON */
.small-btn{
  font-size:12px;
  padding:6px 10px;
  background:#2c7be5;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
  margin-bottom:10px;
}

.row{
  display:flex;
  justify-content:center;
  gap:8px;
}

select{
  padding:8px;
  border-radius:8px;
  border:1px solid #ddd;
}

textarea{
  width:100%;
  height:60px;
  margin-top:10px;
  border-radius:8px;
  padding:8px;
}

button{
  width:100%;
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#2c7be5;
  color:white;
  cursor:pointer;
  font-weight:bold;
}

.todo-item{
  display:flex;
  align-items:center;
  gap:8px;
  padding:6px;
  text-align:left;
}

.result{
  margin-top:15px;
  font-weight:bold;
}

.countdown{
  margin-top:5px;
  color:#2c7be5;
}
</style>
</head>

<body>

<div class="card">

<h2>Task dan Jam Pulang Kantor</h2>
<div class="subtitle">TOWNLANDJKT</div>

<div class="nowTime" id="currentTime"></div>
<div class="nowDate" id="currentDate"></div>

<button class="small-btn" onclick="applyNowTime()">⏰ Gunakan Jam Sekarang</button>

<div class="row">
<select id="hour"></select>
<select id="minute"></select>
</div>

<textarea id="todoInput" placeholder="Hari ini mau ngerjain apa? (Enter untuk tambah task)"></textarea>

<div id="todoList"></div>

<button onclick="calculate()">Hitung Jam Pulang</button>

<div class="result" id="result"></div>
<div class="countdown" id="countdown"></div>

<button id="calendarBtn" style="display:none;">Tambah ke Google Calendar</button>

</div>

<script>

let todos=[];
let endTime=null;
let startTime=null;

/* ===== CLOCK ===== */
function updateClock(){
  let now=new Date();

  currentTime.innerText=now.toLocaleTimeString("id-ID");

  currentDate.innerText=now.toLocaleDateString("id-ID",{
    weekday:"long",
    day:"numeric",
    month:"long",
    year:"numeric"
  });
}
setInterval(updateClock,1000);
updateClock();

/* ===== DROPDOWN ===== */
for(let i=1;i<=24;i++){
  hour.add(new Option(String(i).padStart(2,'0'),i));
}
hour.value=8;

for(let i=0;i<60;i++){
  minute.add(new Option(String(i).padStart(2,'0'),i));
}
minute.value=30;

/* ===== APPLY NOW ===== */
function applyNowTime(){
  let now=new Date();
  hour.value=now.getHours();
  minute.value=now.getMinutes();
}

/* ===== STORAGE ===== */
function todayKey(){
  return new Date().toISOString().slice(0,10);
}

function load(){
  todos=JSON.parse(localStorage.getItem(todayKey())||"[]");
  render();
}

function save(){
  localStorage.setItem(todayKey(),JSON.stringify(todos));
}

/* ===== RENDER ===== */
function render(){
  todoList.innerHTML="";
  todos.forEach((t,i)=>{
    let div=document.createElement("div");
    div.className="todo-item";

    let cb=document.createElement("input");
    cb.type="checkbox";
    cb.onchange=()=>{
      todos.splice(i,1);
      save();
      render();
    };

    let span=document.createElement("span");
    span.innerText=t.text;

    div.append(cb,span);
    todoList.appendChild(div);
  });
}

/* ===== INPUT ===== */
todoInput.addEventListener("keydown",e=>{
  if(e.key==="Enter"){
    e.preventDefault();
    let text=todoInput.value.trim();
    if(text){
      todos.push({text});
      todoInput.value="";
      save();
      render();
    }
  }
});

/* ===== COUNTDOWN ===== */
setInterval(()=>{
  if(!endTime) return;

  let diff=endTime-new Date();

  if(diff<=0){
    countdown.innerText="🟢 Sudah boleh pulang!";
    return;
  }

  let s=Math.floor(diff/1000);
  let h=Math.floor(s/3600);
  let m=Math.floor((s%3600)/60);
  let sec=s%60;

  countdown.innerText=`⏳ Pulang dalam ${h} jam ${m} menit ${sec} detik`;
},1000);

/* ===== FORMAT GOOGLE DATE ===== */
function formatGoogleDate(date){
  return date.toISOString().replace(/[-:]/g,"").split(".")[0]+"Z";
}

/* ===== CALCULATE ===== */
function calculate(){

  let start=new Date();
  start.setHours(hour.value,minute.value,0);

  startTime=start;

  let end=new Date(start.getTime()+8.5*60*60*1000);
  endTime=end;

  result.innerText="Jam pulang kantor "+
    end.toLocaleTimeString("id-ID",{hour:'2-digit',minute:'2-digit'});

  calendarBtn.style.display="block";

  calendarBtn.onclick=()=>{

    let text="Hari ini mau ngerjain:\n- "+todos.map(t=>t.text).join("\n- ");

    let url=`https://calendar.google.com/calendar/render?action=TEMPLATE`+
    `&text=Jam Pulang Kantor`+
    `&dates=${formatGoogleDate(startTime)}/${formatGoogleDate(endTime)}`+
    `&details=${encodeURIComponent(text)}`+
    `&ctz=Asia/Jakarta`;

    window.open(url,"_blank");
  };
}

/* ===== INIT ===== */
load();

</script>

</body>
</html>
