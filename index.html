<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jam Pulang Kantor</title>

<style>

body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#eef2f6;
  font-family:Arial;
}

.card{
  background:white;
  padding:25px;
  border-radius:18px;
  width:480px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.nowTime{font-weight:bold;font-size:18px;}
.nowDate{font-size:12px;color:#777;margin-bottom:8px;}

.row{display:flex;gap:6px;justify-content:center;}

select{
  padding:8px;
  border-radius:8px;
  border:1px solid #ddd;
}

textarea{
  width:100%;
  height:60px;
  margin-top:8px;
  border-radius:8px;
  padding:8px;
}

button{
  width:100%;
  margin-top:8px;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#2c7be5;
  color:white;
  cursor:pointer;
}

.todo-item{
  display:flex;
  align-items:center;
  gap:8px;
  padding:6px;
  border-radius:6px;
  cursor:grab;
}

.todo-item.dragging{
  opacity:0.5;
}

.done{
  text-decoration:line-through;
  color:#aaa;
}

.progress{
  margin-top:10px;
  height:8px;
  background:#ddd;
  border-radius:5px;
  overflow:hidden;
}

.progress-bar{
  height:100%;
  background:#2c7be5;
  width:0%;
}

.history{
  margin-top:10px;
  font-size:12px;
  max-height:80px;
  overflow:auto;
}

</style>
</head>

<body>

<div class="card">

<h3>🏢 Jam Pulang Kantor</h3>

<div class="nowTime" id="currentTime"></div>
<div class="nowDate" id="currentDate"></div>

<div class="row">
<select id="hour"></select>
<select id="minute"></select>
</div>

<textarea id="todoInput" placeholder="Enter untuk tambah task"></textarea>

<div id="todoList"></div>

<div class="progress"><div id="progressBar" class="progress-bar"></div></div>

<button onclick="calculate()">Hitung Jam Pulang</button>

<div id="result"></div>
<div id="countdown"></div>

<button id="calendarBtn" style="display:none;">Tambah ke Calendar</button>

<div class="history" id="history"></div>

</div>

<script>

let todos=[];
let dragIndex=null;

function getToday(){
  return new Date().toISOString().slice(0,10);
}

/* CLOCK */
setInterval(()=>{
  let now=new Date();
  currentTime.innerText=now.toLocaleTimeString();
  currentDate.innerText=now.toDateString();
},1000);

/* DROPDOWN */
for(let i=1;i<=24;i++){
  hour.add(new Option(i,i));
}
hour.value=8;

for(let i=0;i<60;i++){
  minute.add(new Option(i,i));
}

/* LOAD */
function load(){
  todos=JSON.parse(localStorage.getItem(getToday())||"[]");
  render();
}

/* SAVE */
function save(){
  localStorage.setItem(getToday(),JSON.stringify(todos));
  updateHistory();
}

/* RENDER */
function render(){
  todoList.innerHTML="";
  todos.forEach((t,i)=>{
    let div=document.createElement("div");
    div.className="todo-item";
    div.draggable=true;

    div.ondragstart=()=>dragIndex=i;
    div.ondrop=()=>{
      let temp=todos[i];
      todos[i]=todos[dragIndex];
      todos[dragIndex]=temp;
      save();render();
    };
    div.ondragover=(e)=>e.preventDefault();

    let cb=document.createElement("input");
    cb.type="checkbox";
    cb.checked=t.done;
    cb.onchange=()=>{t.done=!t.done;save();render();};

    let span=document.createElement("span");
    span.innerText=t.text;
    if(t.done) span.classList.add("done");

    div.append(cb,span);
    todoList.appendChild(div);
  });

  updateProgress();
}

/* PROGRESS */
function updateProgress(){
  if(todos.length===0){progressBar.style.width="0%";return;}
  let done=todos.filter(t=>t.done).length;
  progressBar.style.width=(done/todos.length*100)+"%";
}

/* INPUT */
todoInput.addEventListener("keydown",e=>{
  if(e.key==="Enter"){
    e.preventDefault();
    if(todoInput.value){
      todos.push({text:todoInput.value,done:false});
      todoInput.value="";
      save();render();
    }
  }
});

/* HISTORY */
function updateHistory(){
  history.innerHTML="<b>History</b><br>";
  Object.keys(localStorage).forEach(k=>{
    let div=document.createElement("div");
    div.innerText=k;
    div.onclick=()=>{
      todos=JSON.parse(localStorage.getItem(k));
      render();
    };
    history.appendChild(div);
  });
}

/* COUNTDOWN */
let endTime=null;
setInterval(()=>{
  if(!endTime)return;
  let diff=endTime-new Date();
  if(diff<=0){countdown.innerText="🟢 Pulang!";return;}
  let s=Math.floor(diff/1000);
  countdown.innerText=`⏳ ${Math.floor(s/3600)}j ${Math.floor(s%3600/60)}m ${s%60}s`;
},1000);

/* CALCULATE */
function calculate(){
  let start=new Date();
  start.setHours(hour.value,minute.value);

  endTime=new Date(start.getTime()+8.5*60*60*1000);

  result.innerText="Pulang: "+endTime.toLocaleTimeString();

  let text="Hari ini:\n- "+todos.map(t=>t.text).join("\n- ");

  let url=`https://calendar.google.com/calendar/render?action=TEMPLATE`+
  `&text=Jam Pulang`+
  `&details=${encodeURIComponent(text)}`;

  calendarBtn.style.display="block";
  calendarBtn.onclick=()=>window.open(url);
}

/* INIT */
load();
updateHistory();

</script>
</body>
</html>
